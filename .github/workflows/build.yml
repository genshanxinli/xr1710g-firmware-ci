name: XR1710G Firmware CI

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  OW1700K_REPO: openwrt-fanboy/OpenW1700k
  OW1700K_COMMIT: 4dc00ea9557ae9fae5f6d42880368c0435c0a85e
  BUILD_DIR: openwrt

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4
        with:
          path: ci-repo

      - name: Restore ccache
        uses: actions/cache@v4
        id: ccache
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ env.OW1700K_COMMIT }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ env.OW1700K_COMMIT }}-
            ccache-${{ runner.os }}-

      - name: Clone OpenW1700k base
        run: |
          git clone --depth=1 https://github.com/${{ env.OW1700K_REPO }}.git ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          git fetch --depth=1 origin ${{ env.OW1700K_COMMIT }}
          git checkout ${{ env.OW1700K_COMMIT }}

      - name: Apply XR1710G patches
        run: |
          mkdir -p ${{ env.BUILD_DIR }}/package/kernel/mt76/patches
          bash ci-repo/apply-patches.sh ${{ env.BUILD_DIR }} ci-repo/patches

      - name: Debug verify patches applied
        run: |
          echo "=== CWD ==="
          pwd
          echo "=== DTS ==="
          test -f ${{ env.BUILD_DIR }}/target/linux/airoha/dts/an7581-xr1710g-ubi.dts || { echo "FAIL: DTS missing"; exit 1; }
          echo "=== Device ==="
          grep -c econet_xr1710g ${{ env.BUILD_DIR }}/target/linux/airoha/image/an7581.mk || { echo "FAIL: device not in an7581.mk"; exit 1; }
          echo "=== Hostapd patches ==="
          ls ${{ env.BUILD_DIR }}/package/network/services/hostapd/patches/001-* || { echo "FAIL: hostapd patches missing"; exit 1; }

      - name: Update feeds
        run: |
          cd ${{ env.BUILD_DIR }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd ${{ env.BUILD_DIR }}
          cp ../ci-repo/defconfig .config
          make defconfig

      - name: Debug verify config
        run: |
          echo "=== Target ==="
          grep "CONFIG_TARGET_airoha_an7581_DEVICE_econet_xr1710g-ubi=y" ${{ env.BUILD_DIR }}/.config || { echo "FAIL: XR1710G device not selected"; exit 1; }
          echo "=== Key packages ==="
          grep "CONFIG_PACKAGE_luci-app-mlo=y" ${{ env.BUILD_DIR }}/.config || { echo "FAIL: luci-app-mlo not selected"; exit 1; }

      - name: Build
        run: |
          cd ${{ env.BUILD_DIR }}
          make -j$(nproc) V=s > build.log 2>&1

      - name: Surface build errors
        if: failure()
        run: |
          cd ${{ env.BUILD_DIR }}
          echo "=== Build exit code: $? ==="
          echo "=== Last 200 lines of build.log ==="
          tail -200 build.log
          echo "=== Error and warning lines ==="
          grep -niE "error:|Error [0-9]|fatal:|FAILED|stop\.|No rule|No such file" build.log | tail -80

      - name: Debug list build output
        if: always()
        run: |
          echo "=== CWD ==="
          pwd
          echo "=== ls bin ==="
          ls -la ${{ env.BUILD_DIR }}/bin/ 2>/dev/null || echo "bin/ dir missing"
          echo "=== ls bin/targets ==="
          ls -la ${{ env.BUILD_DIR }}/bin/targets/ 2>/dev/null || echo "targets/ dir missing"
          echo "=== ls targets/airoha ==="
          ls -la ${{ env.BUILD_DIR }}/bin/targets/airoha/ 2>/dev/null || echo "airoha/ dir missing"
          echo "=== ls targets/airoha/an7581 ==="
          ls -la ${{ env.BUILD_DIR }}/bin/targets/airoha/an7581/ 2>/dev/null || echo "an7581/ dir missing"
          echo "=== find all built artifacts ==="
          find ${{ env.BUILD_DIR }}/bin -type f 2>/dev/null | head -50

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}/build.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload full bin directory (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-bin-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}/bin/
          if-no-files-found: warn
          retention-days: 3

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xr1710g-firmware-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}/bin/targets/airoha/an7581/*.itb
          if-no-files-found: warn

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUILD_DIR }}/bin/targets/airoha/an7581/*.itb
          tag_name: ${{ github.ref_name }}
          name: XR1710G Firmware ${{ github.ref_name }}
          body: |
            Automated XR1710G firmware build from YYH2913 patches atop OpenW1700k.
          draft: false
          prerelease: false
