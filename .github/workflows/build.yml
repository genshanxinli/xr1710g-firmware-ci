name: XR1710G Firmware CI

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  OW1700K_REPO: openwrt-fanboy/OpenW1700k
  OW1700K_COMMIT: 4dc00ea9557ae9fae5f6d42880368c0435c0a85e
  BUILD_DIR: openwrt

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4
        with:
          path: ci-repo

      - name: Restore ccache
        uses: actions/cache@v4
        id: ccache
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ env.OW1700K_COMMIT }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ env.OW1700K_COMMIT }}-
            ccache-${{ runner.os }}-

      - name: Clone OpenW1700k base
        run: |
          git clone --depth=1 https://github.com/${{ env.OW1700K_REPO }}.git ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          git fetch --depth=1 origin ${{ env.OW1700K_COMMIT }}
          git checkout ${{ env.OW1700K_COMMIT }}

      - name: Apply XR1710G patches
        run: |
          mkdir -p ${{ env.BUILD_DIR }}/package/kernel/mt76/patches
          bash ci-repo/apply-patches.sh ${{ env.BUILD_DIR }} ci-repo/patches

      - name: Debug: verify patches applied
        run: |
          echo "=== an7581.mk XR1710G check ==="
          grep -n "xr1710g\|econet_xr1710g" ${{ env.BUILD_DIR }}/target/linux/airoha/image/an7581.mk || echo "WARNING: XR1710G not in an7581.mk!"
          echo "=== DTS file ==="
          ls -la ${{ env.BUILD_DIR }}/target/linux/airoha/dts/an7581-xr1710g-ubi.dts || echo "WARNING: DTS not found!"
          echo "=== Hostapd patches ==="
          ls ${{ env.BUILD_DIR }}/package/network/services/hostapd/patches/ | head -5

      - name: Update feeds
        run: |
          cd ${{ env.BUILD_DIR }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd ${{ env.BUILD_DIR }}
          cp ../ci-repo/defconfig .config
          make defconfig

      - name: Debug: verify device config
        run: |
          echo "=== Build target ==="
          grep "CONFIG_TARGET_" ${{ env.BUILD_DIR }}/.config | grep -v "^#" | head -20
          echo "=== Packages selected ==="
          grep "CONFIG_PACKAGE_" ${{ env.BUILD_DIR }}/.config | grep -v "^#\|not set" | head -20
      - name: Build
        run: |
          cd ${{ env.BUILD_DIR }}
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: Debug: build output listing
        if: always()
        run: |
          echo "=== bin/targets tree ==="
          find ${{ env.BUILD_DIR }}/bin/targets/ -type f 2>/dev/null | head -50
          echo "=== an7581 dir ==="
          ls -la ${{ env.BUILD_DIR }}/bin/targets/airoha/an7581/ 2>/dev/null || echo "NO DIR"

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xr1710g-firmware-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}/bin/targets/airoha/an7581/*.itb
          if-no-files-found: warn

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUILD_DIR }}/bin/targets/airoha/an7581/*.itb
          tag_name: ${{ github.ref_name }}
          name: XR1710G Firmware ${{ github.ref_name }}
          body: |
            Automated XR1710G firmware build from YYH2913 patches atop OpenW1700k.
          draft: false
          prerelease: false
